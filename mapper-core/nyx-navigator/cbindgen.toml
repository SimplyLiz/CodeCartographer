language = "C"
include_guard = "NAVIGATOR_H"
autogen_warning = "/* This file is generated by cbindgen. Do not edit manually. */"
style = "Both"

[export]
# All public #[no_mangle] extern "C" functions are exported automatically.
# List here only if you need to force-include specific items.
include = []
exclude = []

[fn]
# Emit "const char*" for immutable pointer returns for clarity.
must_use = "{}"
