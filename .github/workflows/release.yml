name: Release

on:
  push:
    tags:
      - "v*"
  # Allow build-only validation runs (all targets, including the Windows leg)
  # without cutting a release — the upload/publish steps below are gated to tags.
  workflow_dispatch:

# Assets are uploaded straight to the GitHub Release from each build job
# (`gh release upload`), never through actions/upload-artifact. Release assets
# don't count against the Actions artifact storage quota, so a full quota can
# never block a release.
jobs:
  create-release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog entry
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release ${GITHUB_REF_NAME}"
          echo "$NOTES" > release_notes.md

      - name: Create draft release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRE=""
          [[ "$TAG" == *-* ]] && PRE="--prerelease"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
          else
            gh release create "$TAG" \
              --draft $PRE \
              --title "CodeCartographer $TAG" \
              --notes-file release_notes.md
          fi

  build:
    name: Build — ${{ matrix.target }}
    needs: create-release
    # Run whether create-release succeeded (tag push) or was skipped
    # (workflow_dispatch validation) — only a real failure/cancel stops us.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    # The Windows leg is optional (marked `optional: true`): a failure there must
    # not fail the build job and block the macOS/Linux release publish.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: codecartographer-aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: codecartographer-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codecartographer-x86_64-unknown-linux-gnu
          # linux-arm64 on a native ARM runner (no cross-toolchain needed): the
          # -no-pie partial link and rust-objcopy localization are the same Unix
          # mechanism as x86_64, just on aarch64. CKB ships a linux/arm64 build,
          # so it needs this .a.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: codecartographer-aarch64-unknown-linux-gnu
          # Windows: binary only. The static lib (consumed by CKB) stays
          # macOS/Linux — the tree-sitter symbol-localization step is a Unix
          # linker mechanism (ld -r + objcopy on an ar archive) that has no MSVC
          # COFF equivalent, and a standalone binary can't hit the symbol
          # collision it guards against. Lib/header steps are skipped below.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codecartographer-x86_64-pc-windows-msvc
            optional: true

    defaults:
      run:
        working-directory: mapper-core/codecartographer

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mapper-core/codecartographer/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('mapper-core/codecartographer/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y build-essential

      - name: Build static library
        run: cargo build --release --target ${{ matrix.target }}

      - name: Localize tree-sitter symbols
        if: runner.os != 'Windows'
        # Hides ts_* / tree_sitter_* symbols inside libcode_cartographer.a so
        # consumers that also link tree-sitter (e.g. Go projects using
        # go-tree-sitter) don't collide at link time. See script header
        # for rationale and mechanism.
        # Invoke via `bash` so a missing executable bit on the script can't fail
        # the step (exit 126) — which broke the first tagged release.
        run: bash scripts/localize-tree-sitter-symbols.sh target/${{ matrix.target }}/release/libcode_cartographer.a

      - name: Regenerate header
        if: runner.os != 'Windows'
        run: cargo install cbindgen --locked 2>/dev/null || true && cbindgen --config cbindgen.toml --output include/codecartographer.h

      - name: Package library artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARTIFACT="${{ matrix.artifact }}"
          STAGING="staging/${ARTIFACT}"
          mkdir -p "${STAGING}/lib" "${STAGING}/include"
          cp "target/${{ matrix.target }}/release/libcode_cartographer.a" "${STAGING}/lib/"
          cp "include/codecartographer.h" "${STAGING}/include/"
          tar -czf "${ARTIFACT}.tar.gz" -C staging "${ARTIFACT}"

      - name: Package binary artifact
        shell: bash
        run: |
          BINARY_ARTIFACT="codecartographer-binary-${{ matrix.artifact }}"
          mkdir -p "staging-bin/${BINARY_ARTIFACT}"
          BIN="target/${{ matrix.target }}/release/codecartographer"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"   # Windows binary carries .exe
          cp "$BIN" "staging-bin/${BINARY_ARTIFACT}/"
          tar -czf "${BINARY_ARTIFACT}.tar.gz" -C staging-bin "${BINARY_ARTIFACT}"

      # Upload straight to the release (tag runs only). --clobber makes re-runs
      # idempotent. workflow_dispatch validation builds skip this and just prove
      # the compile/localize path, using zero artifact storage.
      - name: Upload assets to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILES=()
          [ -f "${{ matrix.artifact }}.tar.gz" ] && FILES+=("${{ matrix.artifact }}.tar.gz")
          FILES+=("codecartographer-binary-${{ matrix.artifact }}.tar.gz")
          gh release upload "$TAG" "${FILES[@]}" --clobber

  finalize:
    name: Checksums + publish
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checksum all release tarballs and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl && cd dl
          # Release-asset download does not touch the Actions artifact quota.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.tar.gz' --dir .
          sha256sum *.tar.gz > checksums.txt
          gh release upload "$TAG" checksums.txt --repo "$GITHUB_REPOSITORY" --clobber
          # Flip the draft live now that every asset + checksum is attached.
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
